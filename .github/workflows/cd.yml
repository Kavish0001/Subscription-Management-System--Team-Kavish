name: CD

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: docker build -f apps/api/Dockerfile -t subscription-api:${{ github.sha }} .
      - run: docker build -f apps/worker/Dockerfile -t subscription-worker:${{ github.sha }} .
      - run: pnpm --filter @subscription/api prisma:generate
      - run: pnpm --filter @subscription/api prisma:migrate:deploy
      - run: pnpm --filter @subscription/web build
